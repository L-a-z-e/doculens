spring:
  application:
    name: doculens

  # --- DataSource ---
  datasource:
    url: jdbc:postgresql://localhost:5432/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  # --- Redis ---
  data:
    redis:
      host: localhost
      port: 6379

  # --- Multipart ---
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
      file-size-threshold: 1MB

  # --- Spring AI ---
  ai:
    google:
      genai:
        api-key: ${GOOGLE_AI_API_KEY}
        chat:
          enabled: false
    ollama:
      base-url: http://localhost:11434
      chat:
        model: deepseek-r1:14b
      embedding:
        model: nomic-embed-text
    vectorstore:
      pgvector:
        initialize-schema: true
        dimensions: 768
        index-type: hnsw
        distance-type: cosine_distance

  # --- Flyway (DB 마이그레이션) ---
  flyway:
    enabled: false

# --- JWT ---
jwt:
  secret: ${JWT_SECRET}
  access-token-validity: 1800000
  refresh-token-validity: 604800000

# --- Server ---
server:
  port: 8080

# --- Logging ---
logging:
  level:
    com.doculens: DEBUG
    org.springframework.ai: DEBUG
