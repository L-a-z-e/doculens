spring:
  application:
    name: doculens

  # --- DataSource ---
  datasource:
    url: jdbc:postgresql://localhost:5432/${POSTGRES_DB:doculens}
    username: ${POSTGRES_USER:doculens}
    password: ${POSTGRES_PASSWORD:doculens_local_dev_2026}

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  # --- Redis ---
  data:
    redis:
      host: localhost
      port: 6379

  # --- Spring AI ---
  # Phase 1-3(Embedding), 1-4(RAG) 단계에서 활성화 예정
  # ai:
  #   google:
  #     gemini:
  #       api-key: ${GOOGLE_AI_API_KEY:}
  #   vectorstore:
  #     pgvector:
  #       initialize-schema: true
  #       dimensions: 768
  #       index-type: hnsw
  #       distance-type: cosine_distance

  # --- Flyway (DB 마이그레이션) ---
  flyway:
    enabled: false

# --- Server ---
server:
  port: 8080

# --- Logging ---
logging:
  level:
    com.doculens: DEBUG
    org.springframework.ai: DEBUG
