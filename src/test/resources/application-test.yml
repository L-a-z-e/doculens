spring:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false

  data:
    redis:
      host: localhost
      port: 6379

  ai:
    google:
      genai:
        chat:
          enabled: false
    ollama:
      base-url: http://localhost:11434
      chat:
        enabled: false
      embedding:
        model: nomic-embed-text
    vectorstore:
      pgvector:
        initialize-schema: true
        dimensions: 768
        index-type: hnsw
        distance-type: cosine_distance

  flyway:
    enabled: false

logging:
  level:
    com.doculens: DEBUG
